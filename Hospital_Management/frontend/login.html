<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HMS — Login | MediCore Hospital Management System</title>
  <meta name="description" content="Login to MediCore Hospital Management System. Role-based access for Admins, Doctors, Receptionists, Patients, Lab Technicians, and Pharmacists.">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/auth.css">
</head>
<body class="auth-body">
  <div class="bg-grid"></div>

  <div class="auth-container">
    <div class="auth-card">

      <!-- Brand -->
      <div class="auth-brand">
        <div class="auth-logo"><i class="fas fa-hospital-alt"></i></div>
        <h1 class="auth-title">MediCore <span class="gradient-text">HMS</span></h1>
        <p class="auth-subtitle">Hospital Management System</p>
      </div>

      <!-- Role Selector -->
      <p style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);margin-bottom:10px;">Select Your Role</p>
      <div class="role-grid">
        <button class="role-btn" data-role="admin"><i class="fas fa-user-shield"></i>Admin</button>
        <button class="role-btn active" data-role="patient"><i class="fas fa-user"></i>Patient</button>
        <button class="role-btn" data-role="doctor"><i class="fas fa-user-doctor"></i>Doctor</button>
        <button class="role-btn" data-role="receptionist"><i class="fas fa-user-nurse"></i>Reception</button>
        <button class="role-btn" data-role="lab_technician"><i class="fas fa-microscope"></i>Lab Tech</button>
        <button class="role-btn" data-role="pharmacist"><i class="fas fa-pills"></i>Pharmacist</button>
      </div>

      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login-panel">Login</button>
        <button class="auth-tab" data-tab="register-panel" id="register-tab">Register</button>
      </div>

      <!-- Error message -->
      <div class="auth-error" id="auth-error"></div>

      <!-- LOGIN Panel -->
      <div class="auth-panel" id="login-panel">
        <form id="login-form">
          <div class="form-group">
            <label class="form-label">Email Address</label>
            <div class="input-icon-wrap">
              <i class="fas fa-envelope input-icon-left"></i>
              <input type="email" id="login-email" class="form-control" placeholder="your@email.com" required autocomplete="email">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <div class="input-icon-wrap">
              <i class="fas fa-lock input-icon-left"></i>
              <input type="password" id="login-password" class="form-control has-right" placeholder="Enter your password" required>
              <i class="fas fa-eye input-icon-right toggle-password"></i>
            </div>
          </div>
          <button type="submit" class="auth-submit">
            <span class="btn-text"><i class="fas fa-sign-in-alt" style="margin-right:8px;"></i>Login to Dashboard</span>
            <div class="btn-spinner"></div>
          </button>
        </form>

        <div class="auth-divider">Demo Credentials</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
          <button class="btn btn-secondary btn-sm" onclick="fillCreds('admin@hms.com','Admin@123')"><i class="fas fa-user-shield"></i> Admin</button>
          <button class="btn btn-secondary btn-sm" onclick="fillCreds('doctor1@hms.com','Doctor@123')"><i class="fas fa-user-doctor"></i> Doctor</button>
          <button class="btn btn-secondary btn-sm" onclick="fillCreds('patient1@hms.com','Patient@123')"><i class="fas fa-user"></i> Patient</button>
          <button class="btn btn-secondary btn-sm" onclick="fillCreds('lab@hms.com','Lab@123')"><i class="fas fa-microscope"></i> Lab Tech</button>
        </div>
      </div>

      <!-- REGISTER Panel -->
      <div class="auth-panel hidden" id="register-panel">
        <form id="register-form">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Full Name</label>
              <div class="input-icon-wrap">
                <i class="fas fa-user input-icon-left"></i>
                <input type="text" id="reg-name" class="form-control" placeholder="John Doe" required>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Phone</label>
              <div class="input-icon-wrap">
                <i class="fas fa-phone input-icon-left"></i>
                <input type="tel" id="reg-phone" class="form-control" placeholder="9800000000">
              </div>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Email Address</label>
            <div class="input-icon-wrap">
              <i class="fas fa-envelope input-icon-left"></i>
              <input type="email" id="reg-email" class="form-control" placeholder="your@email.com" required>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Date of Birth</label>
              <input type="date" id="reg-dob" class="form-control">
            </div>
            <div class="form-group">
              <label class="form-label">Gender</label>
              <select id="reg-gender" class="form-control">
                <option value="">Select</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="other">Other</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Blood Group</label>
            <select id="reg-blood" class="form-control">
              <option value="">Select Blood Group</option>
              <option>A+</option><option>A-</option><option>B+</option><option>B-</option>
              <option>AB+</option><option>AB-</option><option>O+</option><option>O-</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <div class="input-icon-wrap">
              <i class="fas fa-lock input-icon-left"></i>
              <input type="password" id="reg-password" class="form-control has-right" placeholder="Min. 8 characters" required minlength="8">
              <i class="fas fa-eye input-icon-right toggle-password"></i>
            </div>
          </div>
          <button type="submit" class="auth-submit">
            <span class="btn-text"><i class="fas fa-user-plus" style="margin-right:8px;"></i>Create Account</span>
            <div class="btn-spinner"></div>
          </button>
        </form>
      </div>

      <div class="auth-back">
        <a href="/"><i class="fas fa-arrow-left"></i> Back to Home</a>
      </div>
    </div>
  </div>

  <script src="/js/config.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    function fillCreds(email, pw) {
      document.getElementById('login-email').value = email;
      document.getElementById('login-password').value = pw;
    }
  </script>
</body>
</html>
