<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - ShopVerse</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="announcement-bar">
        <div class="announcement-content"><span><i class="fas fa-truck"></i> Free Shipping on orders above ₹999</span></div>
    </div>
    <header class="main-header" id="mainHeader">
        <div class="header-container">
            <div class="logo"><a href="index.html"><span class="logo-icon"><i class="fas fa-shopping-bag"></i></span><span class="logo-text">Shop<span class="logo-accent">Verse</span></span></a></div>
            <nav class="main-nav" id="mainNav">
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="products.html">Shop</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
            <div class="header-actions">
                <a href="cart.html" class="cart-icon"><i class="fas fa-shopping-cart"></i><span class="cart-count" id="cartCount">0</span></a>
                <div class="mobile-toggle" id="mobileToggle"><span></span><span></span><span></span></div>
            </div>
        </div>
    </header>

    <div class="breadcrumb"><div class="container"><a href="index.html">Home</a> <i class="fas fa-chevron-right"></i> <span>My Profile</span></div></div>

    <section class="profile-section">
        <div class="container">
            <div class="profile-layout">
                <aside class="profile-sidebar">
                    <div class="profile-avatar" id="profileAvatar">
                        <div class="avatar-circle"><i class="fas fa-user"></i></div>
                        <h3 id="profileName">User</h3>
                        <p id="profileEmail">user@email.com</p>
                    </div>
                    <nav class="profile-nav">
                        <a href="#" class="profile-nav-item active" data-tab="account"><i class="fas fa-user-circle"></i> Account Info</a>
                        <a href="#" class="profile-nav-item" data-tab="addresses"><i class="fas fa-map-marker-alt"></i> Addresses</a>
                        <a href="#" class="profile-nav-item" data-tab="orders"><i class="fas fa-box"></i> My Orders</a>
                        <a href="#" class="profile-nav-item" data-tab="wishlist"><i class="fas fa-heart"></i> Wishlist</a>
                        <a href="#" class="profile-nav-item" data-tab="security"><i class="fas fa-shield-alt"></i> Security</a>
                        <a href="#" class="profile-nav-item logout" id="profileLogout"><i class="fas fa-sign-out-alt"></i> Logout</a>
                    </nav>
                </aside>

                <div class="profile-content">
                    <!-- Account Tab -->
                    <div class="profile-tab active" id="tabAccount">
                        <h2>Account Information</h2>
                        <form id="accountForm" class="profile-form">
                            <div class="form-row">
                                <div class="form-group"><label>First Name</label><input type="text" id="accFirstName"></div>
                                <div class="form-group"><label>Last Name</label><input type="text" id="accLastName"></div>
                            </div>
                            <div class="form-group"><label>Email</label><input type="email" id="accEmail" readonly></div>
                            <div class="form-group"><label>Phone</label><input type="tel" id="accPhone"></div>
                            <button type="submit" class="btn btn-primary">Save Changes</button>
                        </form>
                    </div>

                    <!-- Addresses Tab -->
                    <div class="profile-tab" id="tabAddresses">
                        <div class="tab-header"><h2>My Addresses</h2><button class="btn btn-primary" id="addAddressBtn"><i class="fas fa-plus"></i> Add Address</button></div>
                        <div class="addresses-grid" id="addressesGrid"></div>
                    </div>

                    <!-- Orders Tab -->
                    <div class="profile-tab" id="tabOrders">
                        <h2>My Orders</h2>
                        <div class="orders-list" id="ordersList"></div>
                    </div>

                    <!-- Wishlist Tab -->
                    <div class="profile-tab" id="tabWishlist">
                        <h2>My Wishlist</h2>
                        <div class="wishlist-grid" id="wishlistGrid"></div>
                    </div>

                    <!-- Security Tab -->
                    <div class="profile-tab" id="tabSecurity">
                        <h2>Change Password</h2>
                        <form id="passwordForm" class="profile-form">
                            <div class="form-group"><label>Current Password</label><input type="password" id="currentPassword" required></div>
                            <div class="form-group"><label>New Password</label><input type="password" id="newPassword" required minlength="8"></div>
                            <div class="form-group"><label>Confirm New Password</label><input type="password" id="confirmNewPassword" required></div>
                            <button type="submit" class="btn btn-primary">Update Password</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div id="footer"></div>

    <button class="back-to-top" id="backToTop"><i class="fas fa-arrow-up"></i></button>
    <div class="toast-container" id="toastContainer"></div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/script.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>
