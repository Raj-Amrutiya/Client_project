<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ShopVerse</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <header class="main-header" id="mainHeader">
        <div class="header-container">
            <div class="logo"><a href="index.html"><span class="logo-icon"><i class="fas fa-shopping-bag"></i></span><span class="logo-text">Shop<span class="logo-accent">Verse</span></span></a></div>
        </div>
    </header>

    <section class="auth-section">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <h1>Welcome Back</h1>
                    <p>Login to your ShopVerse account</p>
                </div>
                <form id="loginForm" class="auth-form">
                    <div class="form-group">
                        <label for="loginEmail"><i class="fas fa-envelope"></i> Email</label>
                        <input type="email" id="loginEmail" name="email" placeholder="Enter your email" required>
                        <span class="error-msg" id="loginEmailError"></span>
                    </div>
                    <div class="form-group">
                        <label for="loginPassword"><i class="fas fa-lock"></i> Password</label>
                        <div class="password-input">
                            <input type="password" id="loginPassword" name="password" placeholder="Enter your password" required>
                            <button type="button" class="toggle-password"><i class="fas fa-eye"></i></button>
                        </div>
                        <span class="error-msg" id="loginPasswordError"></span>
                    </div>
                    <div class="form-options">
                        <label class="checkbox-label"><input type="checkbox" id="rememberMe"> Remember me</label>
                        <a href="#" class="forgot-link">Forgot Password?</a>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block btn-lg">
                        <span>Login</span>
                        <div class="btn-loader" style="display:none;"><div class="spinner-small"></div></div>
                    </button>
                </form>
                <div class="auth-divider"><span>or</span></div>
                <div class="social-auth">
                    <button class="btn btn-social btn-google"><i class="fab fa-google"></i> Google</button>
                    <button class="btn btn-social btn-facebook"><i class="fab fa-facebook-f"></i> Facebook</button>
                </div>
                <p class="auth-switch">Don't have an account? <a href="register.html">Sign Up</a></p>
            </div>
            <div class="auth-image">
                <img src="https://images.unsplash.com/photo-1556742049-0cfed4f6a45d?w=600" alt="Shopping" loading="lazy">
                <div class="auth-image-overlay">
                    <h2>Shop Smart, Live Better</h2>
                    <p>Thousands of products at your fingertips</p>
                </div>
            </div>
        </div>
    </section>

    <div id="footer"></div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/script.js"></script>
    <script src="js/validation.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
